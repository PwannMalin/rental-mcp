<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental MCP • Forklift Rentals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .chat-container {
            background: linear-gradient(180deg, #0f172a 0%, #1e2937 100%);
        }

        .message-bubble {
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-bubble {
            background: linear-gradient(135deg, rgb(234 88 12), rgb(194 65 12));
        }

        .ai-bubble {
            background: #334155;
        }

        button:focus-visible {
            outline: 2px solid #fb923c;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center">
    <div class="w-full max-w-4xl h-screen flex flex-col bg-zinc-900 shadow-2xl overflow-hidden rounded-3xl border border-zinc-800">
        
        <!-- HEADER -->
        <div class="bg-zinc-950 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-orange-600 rounded-2xl flex items-center justify-center text-white text-3xl shadow-inner">
                    🏗️
                </div>
                <div>
                    <h1 class="title-font text-2xl font-semibold tracking-tight">Rental MCP</h1>
                    <p class="text-orange-400 text-sm flex items-center gap-1.5">
                        <span class="w-2 h-2 bg-orange-400 rounded-full animate-pulse"></span>
                        Forklift & Equipment Rentals
                    </p>
                </div>
            </div>
            
            <button onclick="clearChat()" 
                    aria-label="Clear conversation"
                    class="hover:text-white transition-colors flex items-center gap-2 text-sm px-4 py-2 rounded-2xl hover:bg-zinc-800">
                <i class="fas fa-trash"></i>
                <span class="hidden sm:inline">Clear Chat</span>
            </button>
        </div>

        <!-- CHAT AREA -->
        <div id="chat" 
             class="flex-1 overflow-y-auto p-6 space-y-6 chat-container scrollbar-thin">
            
            <!-- Welcome Message -->
            <div class="flex gap-4 message-bubble">
                <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-amber-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-3xl shadow-md">
                    🏗️
                </div>
                <div class="max-w-[75%]">
                    <div class="ai-bubble rounded-3xl rounded-tl-none px-6 py-4 text-base leading-relaxed">
                        Hello! I'm Rental MCP — your expert for <strong>forklift and material handling equipment rentals</strong>.<br><br>
                        Need a forklift for a short-term project, long-term lease, or a demo? I can help with availability, pricing, specs, and recommendations.
                    </div>
                    <p class="text-xs text-zinc-500 mt-2 pl-2">just now</p>
                </div>
            </div>

        </div>

        <!-- INPUT AREA -->
        <div class="bg-zinc-900 border-t border-zinc-800 p-6">
            <div class="relative">
                <div class="flex items-center bg-zinc-800 rounded-3xl border border-zinc-700 focus-within:border-orange-500 focus-within:ring-2 focus-within:ring-orange-500/30 transition-all">
                    
                    <!-- Attachment Button -->
                    <button onclick="attachFile()" 
                            aria-label="Attach file or photo"
                            class="px-6 py-5 text-zinc-400 hover:text-orange-400 transition-colors">
                        <i class="fas fa-paperclip text-xl"></i>
                    </button>
                    
                    <input 
                        id="message"
                        type="text"
                        placeholder="Need a forklift? Ask me anything..."
                        class="flex-1 bg-transparent py-5 px-4 outline-none text-base placeholder-zinc-500"
                        onkeypress="if(event.key === 'Enter') sendMessage()"
                        aria-label="Type your message"
                    />
                    
                    <!-- Send Button -->
                    <button onclick="sendMessage()" 
                            id="send"
                            aria-label="Send message"
                            class="w-12 h-12 bg-orange-600 hover:bg-orange-500 active:bg-orange-700 rounded-2xl flex items-center justify-center text-white transition-all mr-2 shadow-lg">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        
        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${isUser ? 'justify-end' : 'gap-4'} message-bubble`;
            
            if (isUser) {
                messageDiv.innerHTML = `
                    <div class="max-w-[75%]">
                        <div class="user-bubble text-white rounded-3xl rounded-tr-none px-6 py-4 text-base leading-relaxed">
                            ${text}
                        </div>
                        <p class="text-xs text-zinc-500 mt-2 text-right pr-2">just now</p>
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-amber-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-3xl shadow-md">
                        🏗️
                    </div>
                    <div class="max-w-[75%]">
                        <div class="ai-bubble rounded-3xl rounded-tl-none px-6 py-4 text-base leading-relaxed">
                            ${text}
                        </div>
                        <p class="text-xs text-zinc-500 mt-2 pl-2">just now</p>
                    </div>
                `;
            }
            
            chat.appendChild(messageDiv);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function showTypingIndicator() {
            const typingHTML = `
                <div class="flex gap-4" id="typing">
                    <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-amber-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-3xl shadow-md">
                        🏗️
                    </div>
                    <div class="ai-bubble rounded-3xl rounded-tl-none px-6 py-4">
                        <div class="flex gap-1">
                            <div class="w-2 h-2 bg-zinc-400 rounded-full animate-bounce"></div>
                            <div class="w-2 h-2 bg-zinc-400 rounded-full animate-bounce delay-150"></div>
                            <div class="w-2 h-2 bg-zinc-400 rounded-full animate-bounce delay-300"></div>
                        </div>
                    </div>
                </div>
            `;
            chat.insertAdjacentHTML('beforeend', typingHTML);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }
        
        function sendMessage() {
            const input = document.getElementById('message');
            const text = input.value.trim();
            
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';
            
            setTimeout(() => {
                showTypingIndicator();
                
                setTimeout(() => {
                    removeTypingIndicator();
                    
                    const responses = [
                        "We have several 5,000 lb capacity electric forklifts available for immediate rental. Would you like short-term (daily/weekly) or long-term options?",
                        "Great choice! Our Toyota and Crown forklifts are very popular. What's the lift height and application you're looking for?",
                        "For a demo unit, I recommend our 2024 Caterpillar EP series. I can send you specs and pricing right away.",
                        "Current promo: Rent any forklift for 30 days and get the first 5 days free. Want me to check availability in your area?"
                    ];
                    
                    const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                    addMessage(randomResponse, false);
                }, 1100);
            }, 400);
        }
        
        function attachFile() {
            alert("📎 File attachment feature coming soon!\n\nYou can upload photos of equipment or site requirements.");
        }
        
        function clearChat() {
            if (confirm("Clear the entire conversation?")) {
                chat.innerHTML = `
                    <div class="flex gap-4 message-bubble">
                        <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-amber-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-3xl shadow-md">
                            🏗️
                        </div>
                        <div class="max-w-[75%]">
                            <div class="ai-bubble rounded-3xl rounded-tl-none px-6 py-4 text-base leading-relaxed">
                                Hello! I'm Rental MCP — your expert for <strong>forklift and material handling equipment rentals</strong>.<br><br>
                                Need a forklift for a short-term project, long-term lease, or a demo? I can help with availability, pricing, specs, and recommendations.
                            </div>
                            <p class="text-xs text-zinc-500 mt-2 pl-2">just now</p>
                        </div>
                    </div>
                `;
            }
        }
        
        window.onload = () => {
            document.getElementById('message').focus();
        };
    </script>
</body>
</html>
