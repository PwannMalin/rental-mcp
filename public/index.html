<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malin Internal Rental MCP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .chat-container {
            background: linear-gradient(180deg, #0f172a 0%, #1e2937 100%);
        }

        .message-bubble {
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-bubble {
            background: linear-gradient(135deg, #1e40af, #2563eb);
        }

        .ai-bubble {
            background: #1f2937;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-4xl h-screen flex flex-col bg-zinc-900 shadow-2xl overflow-hidden rounded-3xl border border-zinc-700">
        
        <!-- HEADER -->
        <div class="bg-zinc-950 border-b border-zinc-700 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-9 h-9 bg-blue-700 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">
                    M
                </div>
                <div>
                    <h1 class="text-xl font-semibold">Malin Internal Rental MCP</h1>
                    <p class="text-emerald-400 text-xs flex items-center gap-1.5">
                        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                        Live • Connected to Rental Inventory
                    </p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="clearChat()" 
                        aria-label="Clear chat"
                        class="text-zinc-400 hover:text-white px-3 py-1.5 rounded-xl hover:bg-zinc-800 transition-colors text-sm">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-6 chat-container scrollbar-thin">
            
            <div class="flex gap-4 message-bubble">
                <div class="w-9 h-9 bg-blue-700 rounded-2xl flex-shrink-0 flex items-center justify-center text-xl">
                    🏗️
                </div>
                <div class="max-w-[80%]">
                    <div class="ai-bubble rounded-3xl rounded-tl-none px-5 py-4">
                        Hello! I'm the <strong>Internal Rental MCP</strong>.<br><br>
                        Use me to check rental availability, request quotes, or get equipment recommendations for coordinators and internal teams.
                    </div>
                    <p class="text-xs text-zinc-500 mt-1.5 pl-2">just now</p>
                </div>
            </div>

        </div>

        <!-- QUICK ACTIONS -->
        <div class="px-6 py-3 border-t border-zinc-700 bg-zinc-900 flex gap-2 flex-wrap">
            <button onclick="quickAction('Check availability for 5000 lb electric forklift')" 
                    class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl transition-colors">
                Check Availability
            </button>
            <button onclick="quickAction('Request quote for 30-day rental')" 
                    class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl transition-colors">
                Request Quote
            </button>
            <button onclick="quickAction('Show current Raymond reach truck inventory')" 
                    class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl transition-colors">
                Raymond Inventory
            </button>
        </div>

        <!-- INPUT AREA -->
        <div class="bg-zinc-900 border-t border-zinc-700 p-5">
            <div class="flex items-center bg-zinc-800 rounded-3xl border border-zinc-700 focus-within:border-blue-500 transition-all">
                <button onclick="attachFile()" 
                        aria-label="Attach file"
                        class="pl-6 pr-4 py-5 text-zinc-400 hover:text-blue-400">
                    <i class="fas fa-paperclip"></i>
                </button>
                
                <input 
                    id="message"
                    type="text"
                    placeholder="E.g. Need quote for 2x 6000lb electric forklifts for Houston site, 45 days..."
                    class="flex-1 bg-transparent py-5 px-3 outline-none text-sm placeholder-zinc-500"
                    onkeypress="if(event.key === 'Enter') sendMessage()"
                />
                
                <button onclick="sendMessage()" 
                        aria-label="Send"
                        class="w-11 h-11 bg-blue-600 hover:bg-blue-500 rounded-3xl flex items-center justify-center mr-2 text-white">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        
        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'gap-4'} message-bubble`;
            
            if (isUser) {
                div.innerHTML = `
                    <div class="max-w-[75%]">
                        <div class="user-bubble rounded-3xl rounded-tr-none px-5 py-3.5 text-sm">
                            ${text}
                        </div>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="w-9 h-9 bg-blue-700 rounded-2xl flex-shrink-0 flex items-center justify-center text-xl">🏗️</div>
                    <div class="max-w-[75%]">
                        <div class="ai-bubble rounded-3xl rounded-tl-none px-5 py-3.5 text-sm">
                            ${text}
                        </div>
                    </div>
                `;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function showTypingIndicator() {
            const html = `
                <div class="flex gap-4" id="typing">
                    <div class="w-9 h-9 bg-blue-700 rounded-2xl flex-shrink-0 flex items-center justify-center text-xl">🏗️</div>
                    <div class="ai-bubble rounded-3xl rounded-tl-none px-5 py-4">
                        <div class="flex gap-1">
                            <div class="w-2 h-2 bg-zinc-400 rounded-full animate-bounce"></div>
                            <div class="w-2 h-2 bg-zinc-400 rounded-full animate-bounce delay-150"></div>
                            <div class="w-2 h-2 bg-zinc-400 rounded-full animate-bounce delay-300"></div>
                        </div>
                    </div>
                </div>
            `;
            chat.insertAdjacentHTML('beforeend', html);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function removeTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }
        
        async function sendMessage() {

    const input =
        document.getElementById("message");

    const text =
        input.value.trim();

    if (!text) return;

    addMessage(text, true);

    input.value = "";

    showTypingIndicator();

    try {

        const response = await fetch(
            "/chat",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: text
                })
            }
        );

        const data =
            await response.json();

        removeTyping();

        addMessage(
            data.answer ||
            "No response received.",
            false
        );

    } catch (err) {

        removeTyping();

        addMessage(
            `❌ Error: ${err.message}`,
            false
        );

        console.error(err);
    }
}
        
        function quickAction(text) {

    document.getElementById(
        "message"
    ).value = text;

    sendMessage();
}
        
        function attachFile() {
            alert("📎 Attachment uploaded (Internal System)\n\nYou can attach PO, site photos, or spec sheets.");
        }
        
        function clearChat() {
            if (confirm("Clear this chat session?")) {
                chat.innerHTML = `
                    <div class="flex gap-4 message-bubble">
                        <div class="w-9 h-9 bg-blue-700 rounded-2xl flex-shrink-0 flex items-center justify-center text-xl">🏗️</div>
                        <div class="max-w-[80%]">
                            <div class="ai-bubble rounded-3xl rounded-tl-none px-5 py-4">
                                Hello! I'm the <strong>Internal Rental MCP</strong>.<br><br>
                                Use me to check rental availability, request quotes, or get equipment recommendations for coordinators and internal teams.
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        
        // Initialize
        window.onload = () => document.getElementById('message').focus();
    </script>
</body>
</html>
