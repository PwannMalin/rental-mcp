<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental MCP • AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --primary: 59 130 246;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .chat-container {
            background: linear-gradient(180deg, #0f172a 0%, #1e2937 100%);
        }

        .message-bubble {
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-bubble {
            background: linear-gradient(135deg, rgb(59 130 246), rgb(29 78 216));
        }

        .ai-bubble {
            background: #334155;
        }

        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }
        
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background-color: #475569;
            border-radius: 20px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
        }
        
        .typing-dot {
            height: 5px;
            width: 5px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typingBounce 1.2s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 150ms; }
        .typing-dot:nth-child(3) { animation-delay: 300ms; }
        
        @keyframes typingBounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center">
    <div class="w-full max-w-4xl h-screen flex flex-col bg-zinc-900 shadow-2xl overflow-hidden rounded-3xl border border-zinc-800">
        
        <!-- HEADER -->
        <div class="bg-zinc-950 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl shadow-inner">
                    R
                </div>
                <div>
                    <h1 class="title-font text-2xl font-semibold tracking-tight">Rental MCP</h1>
                    <p class="text-emerald-400 text-sm flex items-center gap-1.5">
                        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                        AI Assistant Online
                    </p>
                </div>
            </div>
            
            <div class="flex items-center gap-6 text-zinc-400">
                <button onclick="clearChat()" 
                        class="hover:text-white transition-colors flex items-center gap-2 text-sm">
                    <i class="fas fa-trash"></i>
                    <span>Clear</span>
                </button>
                <div class="w-8 h-8 bg-zinc-800 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-zinc-700 transition-colors">
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div id="chat" 
             class="flex-1 overflow-y-auto p-6 space-y-6 chat-container scrollbar-thin">
            
            <!-- Welcome Message -->
            <div class="flex gap-4 message-bubble">
                <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-white text-xl shadow-md">
                    ✨
                </div>
                <div class="max-w-[75%]">
                    <div class="ai-bubble rounded-3xl rounded-tl-none px-5 py-4 text-base leading-relaxed">
                        Hello! I'm Rental MCP, your intelligent real estate assistant.<br>
                        How can I help you today? Ask me about properties, market trends, or rental strategies.
                    </div>
                    <p class="text-xs text-zinc-500 mt-2 pl-2">just now</p>
                </div>
            </div>

        </div>

        <!-- INPUT AREA -->
        <div class="bg-zinc-900 border-t border-zinc-800 p-6">
            <div class="relative">
                <div class="flex items-center bg-zinc-800 rounded-3xl border border-zinc-700 focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-500/30 transition-all">
                    <button class="px-6 text-zinc-400 hover:text-white transition-colors">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    
                    <input 
                        id="message"
                        type="text"
                        placeholder="Ask Rental MCP anything about rentals..."
                        class="flex-1 bg-transparent py-5 px-4 outline-none text-base placeholder-zinc-500"
                        onkeypress="if(event.key === 'Enter') sendMessage()"
                    />
                    
                    <button onclick="sendMessage()" 
                            id="send"
                            class="w-12 h-12 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 rounded-2xl flex items-center justify-center text-white transition-all mr-2 shadow-lg">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                
                <div class="text-center text-[10px] text-zinc-500 mt-3 flex items-center justify-center gap-4">
                    <span>Rental MCP can make mistakes. Consider checking important info.</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        
        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${isUser ? 'justify-end' : 'gap-4'} message-bubble`;
            
            if (isUser) {
                messageDiv.innerHTML = `
                    <div class="max-w-[75%]">
                        <div class="user-bubble text-white rounded-3xl rounded-tr-none px-6 py-4 text-base leading-relaxed">
                            ${text}
                        </div>
                        <p class="text-xs text-zinc-500 mt-2 text-right pr-2">just now</p>
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-white text-xl shadow-md">
                        ✨
                    </div>
                    <div class="max-w-[75%]">
                        <div class="ai-bubble rounded-3xl rounded-tl-none px-6 py-4 text-base leading-relaxed">
                            ${text}
                        </div>
                        <p class="text-xs text-zinc-500 mt-2 pl-2">just now</p>
                    </div>
                `;
            }
            
            chat.appendChild(messageDiv);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function showTypingIndicator() {
            const typingHTML = `
                <div class="flex gap-4 typing-indicator" id="typing">
                    <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-white text-xl shadow-md">
                        ✨
                    </div>
                    <div class="ai-bubble rounded-3xl rounded-tl-none px-6 py-4">
                        <div class="typing-indicator">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>
                </div>
            `;
            chat.insertAdjacentHTML('beforeend', typingHTML);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }
        
        async function sendMessage() {
            const input = document.getElementById('message');
            const text = input.value.trim();
            
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';
            
            // Simulate AI thinking
            setTimeout(() => {
                showTypingIndicator();
                
                setTimeout(() => {
                    removeTypingIndicator();
                    
                    // Sample AI responses
                    const responses = [
                        "That's a great question! Based on current market data, average rental yields in that area are around 6.2%.",
                        "I can help with that. Would you like me to analyze comparable properties in the neighborhood?",
                        "Here's what I found: The property at 142 Maple Ave is currently listed at $2,450/month. Want more details?",
                        "Great choice! That location has seen 8% year-over-year rental growth."
                    ];
                    
                    const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                    addMessage(randomResponse, false);
                }, 1200);
            }, 300);
        }
        
        function clearChat() {
            if (confirm("Clear the entire conversation?")) {
                chat.innerHTML = `
                    <div class="flex gap-4 message-bubble">
                        <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-white text-xl shadow-md">
                            ✨
                        </div>
                        <div class="max-w-[75%]">
                            <div class="ai-bubble rounded-3xl rounded-tl-none px-5 py-4 text-base leading-relaxed">
                                Hello! I'm Rental MCP, your intelligent real estate assistant.<br>
                                How can I help you today? Ask me about properties, market trends, or rental strategies.
                            </div>
                            <p class="text-xs text-zinc-500 mt-2 pl-2">just now</p>
                        </div>
                    </div>
                `;
            }
        }
        
        // Tailwind script already loaded via CDN
        console.log('%cRental MCP AI Chat Ready 🚀', 'color:#3b82f6; font-family:monospace; font-size:13px');
        
        // Focus input on load
        window.onload = () => {
            document.getElementById('message').focus();
        };
    </script>
</body>
</html>
